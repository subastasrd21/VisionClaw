name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'samples/CameraAccess/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcode-select -p

      - name: Create Keychain and Import Certificate
        run: |
          set -e

          # Use certificate without password from repo
          CERT_PATH="ios/codemagic/development_cert_no_password.p12"

          if [ ! -f "$CERT_PATH" ]; then
            echo "❌ Certificate not found at $CERT_PATH"
            exit 1
          fi

          # Extract cert and key for direct usage
          CERT_PEM=$RUNNER_TEMP/cert.pem
          KEY_PEM=$RUNNER_TEMP/key.pem

          openssl pkcs12 -in "$CERT_PATH" -passin pass: -clcerts -nokeys -out "$CERT_PEM"
          openssl pkcs12 -in "$CERT_PATH" -passin pass: -nocerts -nodes -out "$KEY_PEM"

          # Create KEYCHAIN without setting it as default
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "temp123" "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp123" "$KEYCHAIN_PATH"

          # Import certificate and key separately
          security import "$CERT_PEM" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import "$KEY_PEM" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          # Set keychain as default
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "✅ Certificate imported successfully"

      - name: Install Provisioning Profiles
        run: |
          set -e
          PROFILE_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          # Install Development profile
          DEV_PROFILE="ios/codemagic/VisionClaw_Development.mobileprovision"
          if [ -f "$DEV_PROFILE" ]; then
            cp "$DEV_PROFILE" "$PROFILE_DIR/"
            echo "✅ Development profile installed to $PROFILE_DIR"
            ls -lh "$PROFILE_DIR/VisionClaw_Development.mobileprovision"
          else
            echo "❌ Development profile not found at $DEV_PROFILE"
            exit 1
          fi

          # Install Ad Hoc profile
          ADHOC_PROFILE="ios/codemagic/VisionClaw_Ad_Hoc.mobileprovision"
          if [ -f "$ADHOC_PROFILE" ]; then
            cp "$ADHOC_PROFILE" "$PROFILE_DIR/"
            echo "✅ Ad Hoc profile installed"
            ls -lh "$PROFILE_DIR/VisionClaw_Ad_Hoc.mobileprovision"
          else
            echo "❌ Ad Hoc profile not found at $ADHOC_PROFILE"
            exit 1
          fi

          # Verify all profiles
          echo "📋 All provisioning profiles:"
          ls -lh "$PROFILE_DIR/"

      - name: Generate Secrets.swift
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          printf 'import Foundation\n\nenum Secrets {\n  static let geminiAPIKey = "%s"\n  static let openClawHost = "http://localhost"\n  static let openClawPort = 18789\n  static let openClawHookToken = ""\n  static let openClawGatewayToken = ""\n  static let webrtcSignalingURL = "ws://localhost:8080"\n}\n' "$GEMINI_API_KEY" > samples/CameraAccess/CameraAccess/Secrets.swift
          echo "✅ Secrets.swift generated"

      - name: Build iOS IPA
        working-directory: samples/CameraAccess
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          set -e
          echo "Building iOS IPA..."

          xcodebuild archive \
            -project CameraAccess.xcodeproj \
            -scheme "CameraAccess" \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/CameraAccess.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/Library/MobileDevice/Provisioning\ Profiles/VisionClaw_Development.mobileprovision \
            CODE_SIGN_STYLE=Automatic

          echo "Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath build/CameraAccess.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

          echo "✅ IPA generated"
          ls -lh build/ipa/*.ipa

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA
          path: samples/CameraAccess/build/ipa/*.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            samples/CameraAccess/build/**/*.log
            /var/tmp/xcodebuild*.log
          retention-days: 7

      - name: Build Complete
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ IPA built successfully!"
          echo "=========================================="
          echo ""
          echo "📥 Download from GitHub Actions:"
          echo "   Actions → Build iOS IPA → VisionClaw-IPA artifact"
          echo ""
          echo "📱 Install on iPhone:"
          echo "   Option A: Use fastlane"
          echo "     gem install fastlane"
          echo "     fastlane run install_on_device ipa:path/to/CameraAccess.ipa"
          echo ""
          echo "   Option B: Use Xcode"
          echo "     open build/ipa/CameraAccess.ipa"
          echo ""
          echo "   Option C: Use ios-app-installer"
          echo "     npm install -g ios-app-installer"
          echo "     ios-app-installer -i CameraAccess.ipa"
          echo ""
