# VisionClaw CI/CD configuration for Meta Rayban 2
#
# Workflows:
#   vision-claw-ios — build signed iOS IPA for Ad Hoc sideload (download from Codemagic)
#   vision-claw-android — build signed Android APK + AAB for Play Store
#
# Required Codemagic setup in the UI:
#
# 1. Environment variables -> create ONE group:
#
#    visionclaw-secrets  (mark each entry "Secret")
#      GEMINI_API_KEY
#      DEVELOPMENT_CERT_B64       (your .p12 file, base64 encoded)
#      DEVELOPMENT_CERT_PASSWORD  (password for the .p12)
#
#    visionclaw-config   (NOT secret — plain values)
#      BUNDLE_ID
#
# 2. iOS Signing: Upload Ad Hoc provisioning profile to repo at:
#    ios/codemagic/VisionClaw_Ad_Hoc.mobileprovision
#
# 3. To trigger builds: Codemagic UI -> vision-claw-ios workflow -> Start new build
#    Then DOWNLOAD the IPA and install on iPhone via sideload

workflows:
  vision-claw-ios:
    name: VisionClaw iOS (Ad Hoc Sideload)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: samples/CameraAccess
    environment:
      groups:
        - visionclaw-secrets
        - visionclaw-config
      vars:
        XCODE_SCHEME: "CameraAccess"
      xcode: latest

    scripts:
      - name: "📌 Build Info"
        script: |
          echo "===================="
          echo "VisionClaw iOS Build"
          echo "===================="
          echo "Scheme: $XCODE_SCHEME"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Build number: $BUILD_NUMBER"
          ls -la

      - name: "🔑 Initialize Keychain"
        script: |
          set -e
          keychain initialize

      - name: "📜 Add Development Certificate"
        script: |
          set -e
          : "${DEVELOPMENT_CERT_B64:?missing — add as Secret env var}"
          : "${DEVELOPMENT_CERT_PASSWORD:?missing — add as Secret env var}"

          CERT_PATH="/tmp/development_cert.p12"
          echo "$DEVELOPMENT_CERT_B64" | base64 --decode > "$CERT_PATH"

          keychain add-certificates \
            --certificate "$CERT_PATH" \
            --certificate-password "$DEVELOPMENT_CERT_PASSWORD"

          rm -f "$CERT_PATH"
          echo "✅ Certificate added to keychain"

      - name: "📱 Install Ad Hoc Provisioning Profile"
        script: |
          set -e
          BUILD_ROOT="${CM_BUILD_DIR:-$(pwd)/..}"
          PROFILE_SRC="$BUILD_ROOT/ios/codemagic/VisionClaw_Ad_Hoc.mobileprovision"
          PROFILE_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"

          echo "Looking for profile at: $PROFILE_SRC"

          if [ ! -f "$PROFILE_SRC" ]; then
            echo "❌ Profile not found at $PROFILE_SRC"
            echo "Make sure to commit it to the repo:"
            echo "  mkdir -p ios/codemagic"
            echo "  cp ~/Downloads/VisionClaw_Ad_Hoc.mobileprovision ios/codemagic/"
            echo "  git add ios/codemagic/"
            echo "  git commit -m 'chore: add Ad Hoc provisioning profile'"
            echo "  git push"
            exit 1
          fi

          mkdir -p "$PROFILE_DIR"
          cp "$PROFILE_SRC" "$PROFILE_DIR/"
          xcode-project use-profiles
          echo "✅ Provisioning profile installed"

      - name: "📦 Prepare Xcode project"
        script: |
          set -e
          echo "Project uses Xcode directly (no CocoaPods)"
          ls -la CameraAccess.xcodeproj/

      - name: "🏗️ Build iOS IPA (Ad Hoc)"
        script: |
          set -e
          xcodebuild build-for-testing \
            -project "CameraAccess.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Apple Development"

          xcodebuild -exportArchive \
            -archivePath "build/CameraAccess.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath "build/ipa" \
            -allowProvisioningUpdates

      - name: "✅ Build Complete"
        script: |
          echo ""
          echo "=========================================="
          echo "✅ IPA ready for download!"
          echo "=========================================="
          echo ""
          echo "📥 Download from Codemagic UI:"
          echo "   Artifacts → build/ipa/CameraAccess.ipa"
          echo ""
          echo "📱 Install on iPhone:"
          echo ""
          echo "  Option A: Use fastlane (recommended)"
          echo "    gem install fastlane"
          echo "    fastlane run install_on_device ipa:path/to/CameraAccess.ipa"
          echo ""
          echo "  Option B: Use Xcode (requires Mac)"
          echo "    open build/ipa/CameraAccess.ipa"
          echo ""
          echo "  Option C: Use ios-app-installer"
          echo "    npm install -g ios-app-installer"
          echo "    ios-app-installer -i CameraAccess.ipa"
          echo ""

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - subastasrd21@gmail.com
        notify:
          success: true
          failure: true

  vision-claw-android:
    name: VisionClaw Android → Play Store
    instance_type: linux
    max_build_duration: 60
    working_directory: samples/CameraAccessAndroid
    environment:
      groups:
        - visionclaw-secrets
      vars:
        GRADLE_HOME: $HOME/.gradle
      android_signing:
        - keystore_reference
      java: java17

    scripts:
      - name: "📌 Build Info"
        script: |
          echo "========================"
          echo "VisionClaw Android Build"
          echo "========================"
          echo "Gradle version: $(./gradlew --version | grep Gradle)"
          pwd
          ls -la

      - name: "⚙️ Configure Gradle"
        script: |
          set -e
          echo "org.gradle.jvmargs=-Xmx4096m" >> ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> ~/.gradle/gradle.properties

      - name: "📦 Build Release"
        script: |
          set -e
          ./gradlew clean build \
            -Pandroid.useAndroidX=true \
            -Porg.gradle.jvmargs="-Xmx4096m" \
            --stacktrace

      - name: "📦 Build Release Bundle (AAB)"
        script: |
          set -e
          ./gradlew bundleRelease \
            -Pandroid.useAndroidX=true

      - name: "✅ Build Complete"
        script: |
          echo "=== Artifacts ready ==="
          ls -lah app/build/outputs/apk/release/
          ls -lah app/build/outputs/bundle/release/

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $ANDROID_KEYSTORE
        track: internal
        submit_as_draft: true

      email:
        recipients:
          - subastasrd21@gmail.com
        notify:
          success: true
          failure: true
